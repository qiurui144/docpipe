# Full tier — 含 MinerU CPU sidecar（spec §8 本地算力路径）。
# 适用场景：重度 OCR 需求（学术论文 / 复杂表格）、需要精确公式解析的场景。
# MinerU 版本锁定：mineru/mineru-api:0.10.1（更新前请查阅 DEVELOP.md 中的版本说明）。
services:
  attune-docs-server:
    image: attune-docs-server:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    environment:
      BIND_ADDR: "0.0.0.0:8200"
      DATABASE_URL: "sqlite:///data/attune-docs.db"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      EMBED_MODEL: "${EMBED_MODEL:-bge-m3}"
      SQLITE_PATH: "/data/attune-docs.db"
      MINERU_URL: "http://mineru:8000"
      MAX_OCR_CONCURRENCY: "2"
    volumes:
      - attune_docs_data:/data
      - attune_docs_models:/root/.local/share/attune-docs/models
    depends_on:
      mineru:
        condition: service_healthy
    restart: unless-stopped

  mineru:
    # pin 具体版本；升级前在 staging 测试，见 DEVELOP.md §MinerU 升级策略
    image: mineru/mineru-api:0.10.1
    expose:
      - "8000"
    environment:
      MINERU_DEVICE: "cpu"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  attune_docs_data:
  attune_docs_models:
